<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SQ Industrial Demo</title>
    <script>
      // Single Page App routing fix for GitHub Pages
      // Redirects all 404s to index.html with the path stored in sessionStorage
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace('/sq-demo/');
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
